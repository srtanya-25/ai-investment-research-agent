name: Investment Research Agent CI/CD

on:
  push:
    branches: ["main"]

jobs:

  test-backend:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: invagent_db
          POSTGRES_USER: invagent_user
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'invagent_pass' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-secret-key' }}
      DEBUG: "True"
      DATABASE_URL: postgresql://invagent_user:${{ secrets.POSTGRES_PASSWORD || 'invagent_pass' }}@localhost:5432/invagent_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python manage.py test

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run tests
        run: |
          cd frontend
          npm test

      - name: Build
        run: |
          cd frontend
          npm run build

  build-push:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]   # only runs when both jobs pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          no-cache: true
          tags: ${{ secrets.DOCKER_USERNAME }}/invagent-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          no-cache: true
          tags: ${{ secrets.DOCKER_USERNAME }}/invagent-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.BACKEND_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-push]

    steps:
      # Backend redeploys via its Render hook. The frontend auto-deploys on
      # Vercel when main updates, so it does not need a step here.
      - name: Deploy backend to Render
        run: curl -X POST ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
