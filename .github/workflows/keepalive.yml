name: Keep backend awake

# The backend runs on Render's free tier, which sleeps after about 15 minutes
# of no traffic. This pings it every 10 minutes so the live site stays quick to load.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: curl -s -o /dev/null -w "status %{http_code}\n" https://invagent-backend.onrender.com/api/v1/login/ || true
